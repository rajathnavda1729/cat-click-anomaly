services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: cat-click-anomaly-ch
    ports:
      - "9000:9000"   # Native protocol
      - "8123:8123"   # HTTP
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - .:/workspace
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  clickhouse_data:
